<div class="search-wrapper mb-5">
  <div class="search-box shadow-lg">
    <input
      type="text"
      placeholder="Search for games..."
      [ngModel]="searchTerm()"
      (ngModelChange)="searchTerm.set($event)"
      (keyup.enter)="search()"
    />

    <button (click)="search()">Search</button>
  </div>
</div>
